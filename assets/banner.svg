    <line x1="820" y1="200" x2="960" y2="230"/>
    <line x1="820" y1="200" x2="760" y2="110"/>
    <line x1="820" y1="200" x2="730" y2="280"/>
    <line x1="920" y1="120" x2="960" y2="230"/>
    <line x1="920" y1="120" x2="760" y2="110"/>
