    <line x1="760" y1="110" x2="700" y2="170"/>
    <line x1="730" y1="280" x2="800" y2="320"/>
    <line x1="1060" y1="190" x2="1080" y2="290"/>
  </g>

  <!-- Node glows (blurred) -->
